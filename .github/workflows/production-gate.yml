name: Production Gate

on:
  pull_request:
    branches:
      - main
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  require-owner-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Require dev to main promotion
        if: ${{ github.head_ref != 'dev' }}
        run: |
          echo "Production PR must come from dev. Current head: ${{ github.head_ref }}"
          exit 1
      - name: Require manual owner approval marker
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const approved =
              body.includes("[x] Owner approved production release") ||
              body.includes("[X] Owner approved production release");

            if (!approved) {
              core.setFailed("Production release requires checked owner approval in the PR body.");
            }
